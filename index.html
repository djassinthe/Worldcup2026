<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Worldcup2026/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jeu de pronostics Coupe du Monde 2026 - Famille" />
    <title>⚽ Pronostics Coupe du Monde 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      // GitHub Pages SPA: restore path from 404.html redirect
      (function() {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          var h = new URLSearchParams(window.location.search).get('h') || '';
          window.history.replaceState(null, '', '/Worldcup2026' + decodeURIComponent(p) + decodeURIComponent(h));
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
