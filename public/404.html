<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>⚽ Pronostics Coupe du Monde 2026</title>
  <script>
    // GitHub Pages SPA redirect — preserve path and query
    var repo = '/Worldcup2026';
    var path = window.location.pathname.slice(repo.length);
    var search = window.location.search;
    var hash = window.location.hash;
    var redirect = repo + '/?p=' + encodeURIComponent(path + search) + (hash ? '&h=' + encodeURIComponent(hash) : '');
    window.location.replace(redirect);
  </script>
</head>
<body></body>
</html>
